# Configuration for the regedit systemd service (/lib/systemd/system/regedit.service).
# After editing, run: systemctl restart regedit

# Address to bind. Keep this on loopback unless you have put regedit behind an
# authenticating reverse proxy: it has no authentication of its own.
BIND=127.0.0.1

# TCP port to listen on.
PORT=7890

# Extra arguments, for example to serve a single hive:
#   EXTRA_ARGS=--hive /var/lib/libreg/SYSTEM --root HKEY_LOCAL_MACHINE
# With no --hive, regedit reads the mount map ($LIBREG_HIVES or the per-user
# ~/.config/libreg/hives.conf of the service user).
EXTRA_ARGS=
