# sc differential: our sc (offline SYSTEM hive) vs live sc.exe (the Services
# subtree is reg-saved and compared). A bare create (no obj=) defaults ObjectName
# to LocalSystem for win32 services in both tools as of clients #78, so these
# cases omit obj= to exercise that default.
name: sc_create_own
kind: sc
service: HarnessOwn
ops:
  - create HarnessOwn binPath= C:\own.exe type= own start= demand error= normal DisplayName= HarnessOwn
---
name: sc_create_share_auto
kind: sc
service: HarnessShare
ops:
  - create HarnessShare binPath= C:\share.exe type= share start= auto error= normal DisplayName= HarnessShare
---
name: sc_create_then_config
kind: sc
service: HarnessCfg
ops:
  - create HarnessCfg binPath= C:\cfg.exe type= own start= demand error= normal DisplayName= HarnessCfg
  - config HarnessCfg start= auto error= severe
