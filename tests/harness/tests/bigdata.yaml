# A value larger than 16344 bytes forces a big-data (db) cell. Exercises that
# path in both backends differentially: libreg's db storage and offreg's, with
# the data round-tripping identically. (CONTRACTS hive invariant 12.)
name: big_data_value
tags: [semantic, roundtrip]
operations:
  - op: hive_create
    path: /tmp/libreg_bigdata.hiv
    capture: h
  - op: key_create
    handle: $h
    path: Big
  - op: value_set
    handle: $h
    key: Big
    name: Blob
    type: REG_BINARY
    data: ""
  - op: value_get
    handle: $h
    key: Big
    name: Blob
  - op: hive_save
    handle: $h
expect:
  semantic_equal: true
