# A key with more than 507 subkeys forces ri promotion: the on-disk
# subkey list becomes an ri index root over lh leaves capped at 507
# (CONTRACTS 0.1.7 invariant 11, validated end-to-end vs offreg, not just
# the static ref_ri.hiv fixture). 1100 subkeys -> ri over [507, 507, 86].
# Closes the wide-key half of issue #40.
name: wide_key_ri_promotion
