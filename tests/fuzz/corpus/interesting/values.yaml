# Per-type value edge-case catalog. Generated by `data_fuzz --emit-catalog`.
# Each entry that finds a bug stays here as a regression (CLAUDE-fuzz.md).

REG_BINARY:
  - { name: empty, data: "" }
  - { name: one_byte, data: "qg==" }
  - { name: db_boundary_minus_1, data: "" }
  - { name: db_boundary, data: "" }
  - { name: db_boundary_plus_1, data: "" }
  - { name: big_64k, data: "" }

REG_SZ:
  - { name: empty, data: "" }
  - { name: embedded_null, data: "a\u0000b" }
  - { name: surrogate_pair, data: "😀" }
  - { name: long_4k, data: "" }

REG_MULTI_SZ:
  - { name: empty, data: [] }
  - { name: single, data: ["one"] }
  - { name: embedded_null, data: ["a\u0000b","c"] }
  - { name: surrogate_pair, data: ["😀"] }
  - { name: many, data: ["a","b","c","d","e"] }

REG_DWORD:
  - { name: zero, data: 0 }
  - { name: max, data: 4294967295 }
  - { name: high_bit, data: 2147483648 }

REG_DWORD_BE:
  - { name: max, data: 4294967295 }

REG_QWORD:
  - { name: small, data: 4294967296 }
  - { name: max_as_string, data: "18446744073709551615" }

REG_NONE:
  - { name: null, data: null }
